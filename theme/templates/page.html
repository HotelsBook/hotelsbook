{% extends "base.html" %}
{% block content %}
<section class="max-w-4xl mx-auto px-4 py-16 sm:py-20">
  <!-- Cabeçalho da Página -->
  <header class="mb-12">
    <h1 class="text-3xl md:text-4xl font-bold text-navy leading-tight">{{ page.title }}</h1>
  </header>

  <!-- Conteúdo Principal (Renderização do Markdown) -->
  <div class="markdown-content text-gray-700 leading-relaxed">
    {{ page.content }}
  </div>
</section>

<!-- Estilização Específica para o Conteúdo Markdown -->
<!-- Garante que títulos, listas e links fiquem perfeitos sem precisar de plugins extras -->
<style>
  .markdown-content h2 {
    font-size: 1.875rem; /* text-3xl */
    font-weight: 700;
    color: #0A2540; /* text-navy */
    margin-top: 3rem;
    margin-bottom: 1.5rem;
    line-height: 1.2;
  }
  .markdown-content h3 {
    font-size: 1.5rem; /* text-2xl */
    font-weight: 600;
    color: #0A2540; /* text-navy */
    margin-top: 2rem;
    margin-bottom: 1rem;
    line-height: 1.3;
  }
  .markdown-content p {
    margin-bottom: 1.25rem;
    line-height: 1.75;
  }
  .markdown-content ul {
    list-style-type: disc;
    padding-left: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .markdown-content ol {
    list-style-type: decimal;
    padding-left: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .markdown-content li {
    margin-bottom: 0.5rem;
    line-height: 1.6;
  }
  .markdown-content strong {
    color: #0A2540; /* text-navy */
    font-weight: 600;
  }
  .markdown-content a {
    color: #4A90E2; /* text-lightblue */
    font-weight: 500;
    text-decoration: none;
    transition: color 0.2s;
  }
  .markdown-content a:hover {
    color: #2563EB; /* blue-600 */
    text-decoration: underline;
  }
  .markdown-content blockquote {
    border-left: 4px solid #4A90E2; /* border-lightblue */
    padding-left: 1rem;
    margin: 1.5rem 0;
    font-style: italic;
    color: #4B5563; /* text-gray-600 */
    background-color: #F9FAFB; /* bg-gray-50 */
    padding: 1rem;
    border-radius: 0.375rem;
  }
  .markdown-content hr {
    border: 0;
    height: 1px;
    background-color: #E5E7EB; /* border-gray-200 */
    margin: 2rem 0;
  }
</style>
{% endblock %}
