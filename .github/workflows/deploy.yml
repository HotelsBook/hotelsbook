name: Deploy HotelsBook Static Site

# Triggers:
# 1. Quando fizer push para a branch main
# 2. Botão "Run Workflow" manual no GitHub
on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Permissões necessárias para o GitHub Actions funcionar
permissions:
  contents: read
  pages: write
  id-token: write

# Evita que múltiplos deploys rodem ao mesmo tempo
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # JOB 1: Preparar os arquivos
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Como seus arquivos (index.html, style.css, etc.) estão na raiz:
          path: '.'

  # JOB 2: Publicar no GitHub Pages
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4